body:
  text: 蠻書卷五唐樊綽撰六􅚲第五􅚲者州之名號也韋齊休雲南行記有十􅚲字作此􅚲字案􅚲字原本誤作臉今從一統志改正又韋齊休雲南行記七字原本誤作大書今亦改正太和陽苴哶謂之陽􅚲大釐謂之史􅚲邆川謂之賧􅚲䝉舍謂之蒙舍􅚲白崖謂之勃弄􅚲案標題稱六􅚲第十卷亦有六􅚲之文此所列乃止五􅚲疑後龍口一城當亦為一􅚲係傳寫誤脫一句也雲南柘東永昌寧北鎮西及開南銀生等七城則有大軍將領之亦稱節度貞元十年掠吐蕃鐵橋城今稱鐵橋節度其餘鎮皆分𨽻焉案自雲南柘東至皆分𨽻焉五十二字與六􅚲文不相屬疑為第六篇雲南城鎮條下之文錯簡於此太和城大釐城陽苴哶城本皆河蠻所居之地也開元二十五年䝉歸義逐河蠻奪據太和城後數月又襲破苴哶盛羅皮取大釐城仍築龍口城為保障閣羅鳯多由太和大釐邆川來往蒙歸義男等初立太和城以為不安遂改剏陽苴哶城太和城北去陽苴哶城一十五里巷陌皆壘石為之髙丈餘連延數里不斷城中有大碑閣羅鳯清平官王蠻利之文案舊唐書閣羅鳯得西瀘令鄭囘甚愛重之更名蠻利後為清平官此云王蠻利者疑即其人也論阻絶皇化之由受制西戎之意龍口城閣羅鳯所築縈抱玷蒼南麓數里城門臨洱水下河上橋長百餘歩過橋分三路直南䝉舍路向西永昌路向東白崖城路大釐城南去陽苴哶城四十里北去龍口城二十五里邑居人户尤衆盛羅皮多在此城并陽苴哶并邆川今並南詔往來所居也家室共守五處如一東南十餘里有舍利水城在洱河中流島上四面臨水夏月最清凉南詔常於此城避暑陽苴哶城南詔大衙門上重樓左右又有階道髙二丈餘甃以青石為磴樓前方二三里南北城門相對太和來往通衢也從樓下門行三百歩至第二重門門屋五間兩行門樓相對各有牓并清平官大軍將六曹長宅也入第二重門行二百餘歩至第三重門門列㦸上有重樓入門是屏墻又行一百餘歩至大廳階髙丈餘重屋製如蛛網架空無柱兩邊皆有門樓下臨清池大廳後小廳小廳後即南詔宅也客館在門樓外東南二里館前有亭亭臨方池周㢠廻七里水深數丈魚鼈悉有邆川城舊邆川也南去龍口城十五里初望父部落居之後浪穹詔豐哶襲而奪之豐哶孫鐸望與南詔戰敗退保劍川南遂有城城依山足東距瀘水北有泥沙自閣羅鳯及異牟尋皆填固增修最為名邑東北有史郎川又東祿諾品川又北俄坤䝉舍川羅盛已上之地舊為蒙舍州去龍口城一日程當五詔俱存而䝉舍北有䝉嶲詔即楊瓜州也同在一川地氣有瘴肥沃宜禾稻又有大池周廻數十里多魚及菱芡之屬川中水東南與勃弄川合流南有籠磨些川凡邆川河䝉舍謂之川賧然邑落人衆蔬果水蔆之味則蒙舍為尤殷渠歛趙本河東州也西巖有石和城烏蠻謂之土山坡陀者謂此州城及太和城俱在陂陀山上故也州中列樹夾道為交流村邑連甍溝塍彌望大族有王楊李趙四姓皆白蠻也云是沮蒲州人遷渉至此因以名州焉東北至毛郎川又東北至賔居湯又北至越析川磨些詔故地也白崖城在勃弄川天寳中附于忠城楊等五州之城也依山為城髙十丈四面皆引水環流惟開南北兩門南隅是舊城周廻二里東北隅新城大厯七年閣羅鳯新築也周㢠廻四里城北門外有慈竹藂大如人脛髙百尺餘城内有閣羅鳯所造大廳修廊曲廡􅈦後院橙枳青翠俯臨北墉舊城内有池方三百餘歩池中有樓舍云貯甲仗川東西二十餘里南北百餘里清平官已下官給分田悉在南詔親屬亦住此城傍其南二十里有蠻子城閣羅鳯庻弟誠節母子舊居也正南去開南城十一日程蠻書卷五
