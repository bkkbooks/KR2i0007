body:
  text: 蠻書目錄載記𩔖卷一雲南界内途程第一卷二山川江源第二巷三六詔第三卷四名𩔖第四卷五六􅚲第五卷六雲南城鎮第六卷七雲南管内物産第七卷八蠻夷風俗第八卷九南蠻條敎第九卷十南蠻疆界接連諸番夷國名第十臣等謹案蠻書十卷唐安南從事樊綽撰新唐書藝文志著於錄宋史藝文志則有綽所撰雲南志十卷而不稱蠻書永樂大典又題作雲南史記名目錯異今攷司馬光通鑑攷異程大昌禹貢圖蔡沈書集傳所引蠻書之文並與是編相同則新唐書志為可信惟志稱綽為嶺南西道節度使蔡襲從事而通鑑載襲實官安南經畧使與綽所記較合是新書亦失攷也綽成此書在懿宗咸通初書中多自稱臣又稱錄六詔始末纂成十卷於安南郡州江口附張守忠進獻葢當時嘗以奏御者交州境接南詔綽為幕僚親見蠻事故於六詔種族風俗山川道里及前後措置始末撰次極詳實輿志中最古之本宋祁作新史南蠻傳司馬光通鑑載南詔事多採用之程大昌等復引所述蘭滄江以證華陽黒水之說葢宋時甚重其書而自眀以來流傳遂絶雖以博雅如楊慎亦稱綽所撰為有錄無書則其亡軼固已乆矣今此本因錄入永樂大典僅存而文字已多斷爛不可讀又世無别本可校謹以諸書參攷旁證正其訛誤而姑闕其不可通者各加案語疏於下方釐為十卷仍依新唐書志題曰蠻書從其朔也乾隆四十一年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
