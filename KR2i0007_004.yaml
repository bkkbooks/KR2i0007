  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0007_WYG_004-1a, image: WYG0464/WYG0464-0012a.png}
body:
  text: 蠻書卷四唐樊綽撰名類第四西爨白蠻也東爨烏蠻也當天寶中東北自曲靖州西南至宣城邑落相望牛馬被野在石城昆州曲軛晉寧喻獻安寧至龍和城謂之西爨在曲靖州彌鹿川升麻川南至步頭謂之東爨風俗名爨也初爨歸王為南寧州都督理石城襲殺蓋聘蓋啓父子案原本訛作孟軻孟啓今據新唐書改正遂有升麻川歸王兄摩湴湴生崇道理曲軛川為兩爨大鬼主崇道弟日進日用在安寧城及章仇兼瓊開步頭路方於安寧築城羣蠻騷動陷殺築城使者元宗遣使敕雲南王蒙歸義討之歸義師次波州而歸王及崇道兄弟爨彥璋等千餘人詣軍門拜謝請奏雪前事歸義露章上聞往返二十五日詔書下一切釋罪無何崇道殺日進又陰害歸王歸王妻阿姹烏蠻女也走投父母稱兵相持諸爨豪亂阿姹私遣使詣烏蒙舍川求投歸義即日抗疏奏聞阿姹男守偶案守偶新唐書作守隅遂代歸王為南寧州都督歸義仍以女妻之又以一女妻崇道男輔朝崇道內懷忿惋外示和平猶與守偶母子日相攻伐阿姹又訴於歸義興師問罪行次昆川信宿而曲軛川潰散崇道南走黎川歸義盡俘其家族羽黨并殺輔朝而取其女崇道俄亦被殺諸爨由是離弱及歸義卒子閣羅鳯立守偶并妻歸河賧案河賧原本作阿體今從唐書改正從此與皇化隔絶阿姹自為烏蠻部落王從京師朝參大蒙恩賞閣羅鳯遣昆川城使楊牟利以兵圍脅西爨徙二十餘萬户於永昌城烏蠻以言語不通多散林谷故得不徙是後自曲靖州石城升麻川昆川南至龍和以來蕩然兵荒矣日用子孫今立在永昌城界內烏蠻種類稍稍復振後徙居西爨故地今與南詔為婚姻之家南蠻去安峰州林西原界二十二日程自大中八年安南都護擅罷林西原防冬戍卒洞主李由獨等七綰首領被蠻誘引復為親情日往月來漸遭侵軼罪在都護失招討之職乖經略之任臣於咸通三年春三月四日奉本使尚書蔡襲手示密委臣單騎及健步二十已下人深入賊帥朱道古營寨三月八日入賊重圍之中蠻賊將楊秉忠大羌楊阿觸楊酋盛悉是烏蠻賊人同迎言辭狡詐臣却迥回一一白於都護王寬寬自是不眀都無逺慮領得臣書牒全無指揮擅放軍迥回茍求朝奬致令臣本使蔡襲枉傷矢石陷失城池徴之其由莫非王寬之過案此條原本文多訛脫今據通鑑考異所引蠻書原文訂正考異又云蔡襲將兵伐寬寬為已替之人安能擅放軍回令襲陷沒疑蠻書擅放軍回上少蔡京二字蓋蔡京時為嶺南西道節度貪懦敗事故考異云然獨錦蠻烏蠻苗裔也在秦藏南去安寧兩日程天寶中為蹄州刺史案蹄州原本作巋州今據新唐書改正其族多姓李異牟尋母獨錦蠻之女也牟尋之姑亦嫁獨錦蠻獨錦蠻之女為牟尋妻有子委負監貞元十年為大將軍在勃弄棟川為城貞元十年以尚書祠部郎中兼御史中丞袁滋內給事俱文珍劉幽巖入雲南持節册南詔異牟尋為雲南王為西南之藩屏牟尋男閣勸已後繼為王案貞元十年以尚書云云至後繼為王五十八字與獨錦蠻事不相涉以文義推之疑為八詔篇蒙舍條下之文當在不令侵掠句後錯簡於此弄棟蠻則白蠻苗裔也本姚州弄棟縣部落其地舊為褒州嘗有部落首領為刺史有誤毆殺司户者為府城論罪遂卒家衆案新唐書南詔傳云有為刺史者誤殺其參軍率族北走據其文則此卒字當作率字家衆下當有北走二字蓋原本脫誤後分散在磨些江側並劍共諸川悉有之餘部落不去當天寶中姚州刺史張乾陀守城拒戰陷死殆盡貞元十年南詔異牟尋破掠吐蕃城邑收獲弄棟城遷於永昌之城青蛉蠻亦白蠻苗裔也本青蛉縣部落天寶中嶲州初陷有首領尹氏父兄子弟相率南奔河賧閣羅鳯厚待之貞元年中南詔清平官尹輔酋尹寬求案唐書作尹仇寬皆其人也衣服言語與蒙舍略同裳人本漢人也部落在鐵橋北不知遷徙年月初襲漢服後稍參諸戎風俗迄今但朝霞纒頭其餘無異貞元十年南詔異牟尋領兵攻破吐蕃鐵橋節度城獲裳人數千户悉移於雲南東北諸川今鐵橋城為南蠻所據差大將軍為城使長褌蠻本烏蠻之後部落在劍川屬浪詔其本俗皆衣長褌曳地更無衣服惟牛羊皮南詔既破劍浪遂遷其部落與施順諸蠻居養給之河蠻本西洱河人今呼為河蠻故地當六詔皆在而河蠻自固洱河城邑開元已前嘗有首領入朝本州刺史受賞而歸者及南詔蒙歸義攻拔大城河蠻遂迸遷化皆羈制於浪詔貞元十年浪詔破敗復徙於雲南東北柘東以居柘東城去安南城三十九日程咸通三年十二月二十七日蠻賊逼交州也城案逼原本作通今據通鑑考異所引蠻書文改正河蠻在蘇歷舊城置營案蘇歷本原作蘇厝今從通鑑考異改正及分布賊衆在簰筏士僅二千餘人施蠻本烏蠻種族也鐵橋西北大施體施賧斂尋皆其所居之地案新唐書南詔傳作施蠻居大施賧斂尋賧此文疑有誤男以繒布為縵襠袴婦人從頂橫分其髮當額并頂後各為一髻男女絡身并跣足披羊皮部落主承上皆吐蕃偽封為王貞元十年案原本祗作貞元年據新唐書乃貞元十年事今補入南詔攻城邑虜其王尋羅并宗族置於蒙舍城養給之順蠻本烏蠻種類初與施蠻部落參居劍共諸川咩羅皮鐸羅望既失邆川浪穹退而逼奪劍共由是遷居鐵橋已上其地名劍羌在斂尋賧西北四百里男女風俗與施蠻略同其部落主吐蕃亦封王貞元十年南詔異牟尋虜其王傍彌潛宗族置於雲南白巖養給之其施蠻部落百姓則散𨽻東北諸川磨蠻亦烏蠻種類也鐵橋上下及大婆二婆三探覽昆池等川皆其所居之地也土多牛羊一家即有羊羣終身不洗手面男女皆披羊皮俗好飲酒歌舞此種本姚州部落百姓也南詔既襲破鐵橋及昆池等諸城凡虜獲萬户盡分𨽻昆州左右及西爨故地磨些蠻在施蠻外與南詔為婚姻家又與越析詔姻婭撲子蠻勇悍矯捷以青婆羅段為通身袴善用白箕竹深林間射飛鼠發無不中部落首領謂酋為上無食器以芭蕉葉藉之開南銀生永昌尋傳四處皆有鐵橋西北邊延蘭滄江亦有部落臣本使蔡襲咸通四年正月三日陳面上生擒得撲子蠻拷問之並不語截其腕亦不聲安南子城虞候梁軻云是撲子蠻今梁軻見在賊中僭稱朱鳶縣令其梁軻始由再賔任使案再賔二字未詳前後三度到蠻王處通好結搆禍胎尋傳蠻閣羅鳯所討定也俗無絲綿布帛披波羅皮跣足可以踐履榛棘持弓挾矢射豪豬案豪字原本作蒙今據新唐書南詔傳改正生食其肉取其兩牙雙插髻傍為飾又條豬皮以繫腰每戰鬬即以籠子籠頭如兜鍪狀臣本使蔡襲咸通三年十二月二十七日以小槍鏢得一百餘人臣本使蔡襲問梁軻見有竹籠頭豬皮繫腰遂説尋傳蠻本末江西將軍士取此蠻肉為炙裸形蠻在尋傳城西三百里為窠穴謂之為野蠻閣羅鳯既定尋傳而令野蠻散居山谷其蠻不戰自調伏集戰自召之案二語文義未明疑有脫誤其男女遍滿山野亦無君長作擖欄舍屋案擖説文集韻並音劼音臘架也撻也多女少男無農田無衣服惟取木皮以蔽形或十妻五妻共一丈夫盡日持弓不下擖欄有外來侵暴者則射之其妻入山林採拾蟲魚菜螺蜆等歸啖食之去咸通三年十二月二十一日亦為羣隊當陳面上如有不前衝前監陳正蠻旋刃其後望苴子蠻在蘭滄江以西是盛羅皮所討定也矯捷善於馬上用槍鏟騎馬不用鞍跣足衣短甲才蔽胸腹而已股膝皆露兜鍪上插犛牛尾馳突若飛其婦人亦如此南詔及諸城鎮大將出兵則望苴子為前驅咸通四年正月二十三日蔡襲城上以車弩射得望苴子二百人馬三十餘匹二月七日城陷及臣本使蔡襲在左膊中箭元從已盡臣右腕中箭攜印浮水渡江荆南江西鄂嶽襄州將健約四百餘人案此句原脫荆南二字又嶽字訛作兵字今從通鑑改正攜陌刀騎馬突到城東水際荆南都虞候元惟德管都頭談可言江西軍判官傳門謂將士曰諸兒郎等水次無船入水必死與諸兄弟每一箇人殺得兩蠻賊我輩亦得便宜遂相率入東羅城擁門裏一邊排長刀一邊排長馬突其蠻賊從城外水次騎馬入門悉無備敵臣見僧無礙説云案此句原本作臣見僧元得今考通鑑考異有引樊綽所説僧無礙之文知得礙字形相近而無又訛為元耳謹改正此日午前旋殺賊并馬僅二三千賊馬三百來匹蠻賊楊思縉案唐書作思僭誤在子城內一更時始知出救翌日以馬肉分俵十二營賊衆望蠻外喻部落在永昌西北其人長排持矟前往無敵又能用木弓短箭箭鏃傅毒藥所中人立斃婦人亦跣足以青布為衫裳聯貫珂貝巴齒真珠斜絡其身數十道有夫者𥪡分兩髻無夫者頂為一髻其地宜沙牛亦大於諸處牛角長四尺以來婦人惟嗜乳酪肥白俗好遨遊黑齒蠻金齒蠻銀齒蠻繡腳蠻繡面蠻並在永昌開南案開南新唐書作關南與此異雜類種也黑齒蠻以漆漆其齒金齒蠻以金縷片裹其齒有事出見人則以此為飾食則去之皆當頂為一髻以青布為通身袴又斜披青布條案此處脫銀齒蠻一條繡腳蠻則於踝上排下周匝刻其膚為文彩衣以緋布以青色為飾繡面蠻初生後出月以針刺面上以青黛傅之僧耆案僧耆亦蠻部之名此下當有脫文悉屬西安城皆為南詔總之攻戰亦召之穿鼻蠻長鬃蠻棟峰蠻其蠻並在柘東南生雜類也穿鼻蠻部落以徑尺金環穿鼻中隔下垂過領若是君長即以絲繩繫其環使人牽起乃行其次者以花頭金釘兩枚從鼻兩邊穿令透出鼻孔中長鬃蠻部落棟峰蠻部落髮黑而長當額前為一長髻下過臍每行即以物撑起若是君長即使兩女人前各持一物兩邊撑其髻乃行今亦為南詔所總攻戰即點之茫蠻部落並是開南雜種也茫是其君之號蠻呼茫詔從永昌城南先過唐封以至鳯藍茸以次茫天連以次茫吐薅又有大賧茫昌茫盛恐茫蘚茫案蘚新唐書作鮓施茫皆其類也樓居無城郭或漆齒皆衣青布袴藤篾纒腰紅繒布纒髻出其餘垂後為飾婦人披五色娑羅籠孔雀巢人家樹上象大如水牛土俗養象以耕田仍燒其糞貞元十年南詔異牟尋攻其族類咸通三年十二月二十一日亦有此茫蠻於安南蘇歷江岸聚二三千人隊粟栗兩姓蠻雷蠻夢蠻皆在茫部臺登城東西散居皆烏蠻白蠻之種族丈夫婦人以黑繒為衣其長曳地又東有白蠻丈夫婦人以白繒為衣下不過膝夢蠻主苴夢衝案苴原本作首今從唐書改正開元末嘗受恩賜於國而暮年又私於吐蕃貞元七年西川節度使韋臯遣嶲州刺史蘇隗案唐書作蘇峗就殺夢衝因别立鬼主以總其部落共推為蠻長貞元中船持為都大鬼主其時夢衝及驃傍皆卑事之亦呼為東蠻豐巴蠻案豐巴唐作書豐琶本出嶲州百姓兩林南二百里而居焉豐巴部落貞元中大鬼主驃傍阿諾兩姓乃諸蠻部落皆為豐巴部落心長向國案此一段文有脫誤崇魔蠻去安南管內林西原十二日程溪洞而居俗養牛馬此年與漢博易自大中八年經略使苛暴令人將鹽往林西原博牛馬每一頭匹只許鹽一斗因此隔絶不將牛馬來桃花人本管安南林西原五綰洞主大首領李由獨管轄亦為境上戍卒每年亦納賦稅自大中八年被峰州知州官申文狀與李涿請罷防冬將健六千人案與李涿三字原本作與湪今據通鑑考異所引蠻書文改正不要味真登州境上防遏案味原本作來今據通鑑考異所引蠻書文改正其由獨兄弟所不禁被蠻柘東節使與書信案書信原本作善信今據通鑑考異所引蠻書文改正將外甥嫁與李由獨小男補柘東押衙自此之後七綰洞悉為蠻收管臣於咸通三年三月八日入賊重圍因見柘東蠻判官楊忠義背後領八箇蠻持弓槍臣因問賊帥朱道古根源切以桃花人今亦呼桃花蠻也本安南林西原七綰洞左右側居人披羊皮或披氈前梳髻雖拘於蠻心皆向唐化咸通三年三月二十一日僅五六千人安南城西角下營蠻賊楊思縉委羅伏州扶邪縣令麻光髙部領之案光髙原本作先髙今據通鑑考異有引蠻書思縉光髙部領之文知先字當作光字謹改正蠻書卷四
