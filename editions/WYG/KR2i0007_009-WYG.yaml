  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0007_WYG_009-1a, image: WYG0464/WYG0464-0030c.png}
body:
  text: 蠻書卷九唐樊綽撰南蠻條教第九南俗務田農菜圃戰鬭不分文武無雜色役每有徴發但下文書與村邑理人處尅往來月日而已其兵仗人各自賫更無官給百家已上有總佐一千人已上有理人官一人約萬家以來即制都督遞相管轄上官授與四十䨇漢二頃也上户三十䨇漢一頃五十畝中户下户各有差降每家有丁壯皆定為馬軍各據邑居逺近分為四軍以旗幡色别其東南西北每面置一將或管千人或五百人四軍又置一軍將統之如有賊盗入界即罪在所入處面將羅苴子皆於鄉兵中試入故稱四軍苴子戴光兜鍪案新唐書南詔傳作戴朱鞮鍪光字疑朱字之訛負犀皮銅股排跣足歴險如飛每百人羅苴佐一人管之負排又從羅苴中揀入無員數南詔及諸鎮大將軍起坐不相離捍蔽者皆負排也羽儀亦無員數皆清平官等子弟充諸蠻不與焉常在雲南王左右羽儀長帳前管係之羽儀長八人如方内節度支衙官之屬清平官已下每入見南詔皆不得佩劍唯羽儀長得佩劍出入臥外雖不主公事最為心腹親信其六曹長即為主外司公務六曹長六人兵曹户曹客曹刑曹工曹會曹一如内州府六司所掌之事又有斷事曹長推鞫盗賊軍謀曹長主陰陽占候同倫長兩人案同倫原本訛作司偏今據後文改正各有副都主月終唱案此字未詳疑誤諸曹稽逋如錄事之職曹官文牒下諸城鎮皆呼主者六曹長有課効眀著得遷補大軍將大軍將一十二人與清平官同列每日見南詔議事出則領要害城鎮稱節度有事跡功勞殊尤者得除授清平官案原本以除授為句今據唐書南詔傳大軍將出治軍壁稱節度次補清平官之文是除授下應有清平官三字原本葢因下條相屬而誤脫耳今增入清平官六人每日與南詔參議境内大事其中推量一人為内算官凡有文書便代南詔判押處置有副兩員同勾當又外算官兩人或清平官或大軍將兼領之六曹公事文書成合行下者一切是外算官與本曹出文牒行下亦無商量裁製又有同倫判官兩人南詔有所處分輒疏記之轉付六曹近年已來南蠻更添職名不少凡試馬軍須五次上射中片板為一次上中雙庶子案二字未詳為一次上四十歩外走馬案此字未詳頗柱中㪷子為一次上盤槍百轉無失為一次上能算能書為一次上試過有優給歩卒須為五次上玷蒼山頂立旗先上到旗下為一次上驀一丈三尺坑過為一次上急流水上浮二千尺為一次上弄劍為一次上負一石五㪷米四十里為一次上已上一一試過得上次者補羅苴也蠻王為樓及諸城鎮林邑但有空平處即立木八十尺刻其上為㪷子中間以墨三寸規之名曰頗柱所試人持竹劍去頗柱四十歩外走馬向前柱中㪷子者上中第二規次之中第一規為下每農隙之時邑中有馬者皆騎馬於頗柱下試習每嵗十一十二月農收既畢兵曹長行文書境内諸城邑村谷各依四軍集人試槍劍甲胄腰刀悉須犀利一事闕即有罪其法一如臨敵布陣羅苴子在前以次弓手排下以次馬軍三十騎為隊如此次第常為定制臨行交錯為犯令每戰南詔皆遣清平官或腹心一人在軍前監視有用命不用命及功大小先後一一疏記迴具白南詔憑此為定賞罰軍將犯令皆得杖或至五十或一百更重者徙瘴地諸在職之人皆以戰功為褒貶黜陟朝廷差使到雲南南詔迎接逺送自數年來緣邕交兩地長吏苛暴恣殺非辜致令衆蠻告寃因茲頻來攻掠伏䝉聖心徴發大軍指揮期於尅復其容州經管三十四羈縻州案新唐書地理志嶺南道羈縻州九十二隸桂管者七州隸邕管者二十六州隸安南者四十一州並無屬容管者與此稍有不合伏請委安南大首領為刺史武定州案新唐書地理志武定州乃安南都䕶府所屬羈縻州之一亦請委大首領為長吏者踵前許經畧使眷顧親屬奏元從押衙為刺史恐非穏便臣竊知故安南前節度使趙昌相繼十三年緝理交阯至今遺愛布在耆老至境内無事其時以都押衙杜英策為招討副使入院判案每月料錢供給七十貫以寄客張舟為經畧判官已後舉張舟為都䕶自李象古任安南經畧使案原本作李象右今考唐書李象古為安南都䕶以苛刻失衆為賊楊清所害葢即此人今改正恣意貪害遂至徴兵續又有李涿繼之誅剝案原本涿上脫李字今據通鑑増入令生靈受害莫非長吏非人所致蠻書卷九
  hash: sha256:eafabf9c624a708085cf4d7944a80f3922db839fff89f75eea79b3f8cdbf0cff
