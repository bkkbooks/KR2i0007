  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0007_WYG_003-1a, image: WYG0464/WYG0464-0009a.png}
body:
  text: 蠻書卷三唐樊綽撰六詔第三六詔並烏蠻又稱八詔葢白巖城時傍及劍川矣羅識二詔之後開元元年中蒙歸義攻石橋城閣羅鳯攻石和亦八詔之數也時傍母䝉歸義之女妻閣羅鳯案新唐書南詔傳云時傍母歸義女其女復妻閣羅鳯据其文則此妻字上應有其女復三字葢原本脫誤初哶羅皮既敗時傍入居邆州招誘上浪得數千户後為閣羅鳯所猜遂遷居白崖城及劍川羅識與神川都督言語交通案原本川都督上脫神字今據新唐書增入時傍與其謀俱求立為詔謀洩時傍被殺害羅識北走神川神川都督送羅些二城案此條雖不標詔名據上文則時傍及羅識亦在詔數也䝉嶲一詔最大初嶲輔首卒案輔原本作轉今從新唐書南詔傳改正無子源羅子年弱及照源在南詔蒙歸義宻有兼吞之意推恩啗利源衆歸焉居數月俘照源及源羅子遂并其地三越析一詔也亦謂之磨些詔部落在賔居舊越析州也去囊葱山一日程有豪族張尋求案張原本作帳今從新唐書南詔傳改正白蠻也貞元中通詔主波衝之妻遂陰害波衝劍南節度廵邊至姚州使召尋求笞殺之遂移其諸部落以地并於南詔波衝兄子于贈提攜家衆走降鐸鞘案鐸鞘乃兵器據後物産篇内有越析詔于贈天降鐸鞘云云疑此走字上當有出字降字上常有天字東北渡瀘邑龍佉沙方一百二十里周􅂞石岸其地總謂之䨇舍于贈部落亦名楊堕居河之東北後䝉歸義隔瀘城臨逼于贈再戰皆敗長男閣羅鳯自請將兵乃擊破楊墮于贈投瀘水死數日始獲其屍并得鐸鞘四浪穹一詔也詔主豐時豐哶兄弟俱在浪穹後豐哶襲邆賧居之由是各為一詔豐時卒子羅鐸立羅鐸卒子鐸邏望立為浪穹州刺史與南詔戰敗以部落退保劍川故盛稱劍浪卒子望偏立望偏卒羅矣羅君立案新唐書南詔傳望偏死子偏羅矣立偏羅矣死子羅君立與此不同疑此文有脫誤貞元十年南詔擊破劍川俘矣羅君徙永昌凡浪穹邆賧施浪總謂之浪人故云三浪詔也五邆賧一詔也主豐哶初襲邆賧御史李知古案李原本作為今據新唐書改正領詔出問罪即日伏辜其子哶羅皮後為邆賧州刺史與䝉歸義同伐靜河蠻遂分據大釐城哶羅皮乃歸義之甥也弱而無謀歸義襲其城奪之哶羅皮復入邆賧即與浪穹施浪兩詔援兵伐歸義於時既剋大釐築龍口城歸義聞三浪兵至率衆拒戰三浪大敗追奔過邆賧敗卒多陷死於泥沙之中哶羅皮從此退居野共川哶羅皮卒子皮羅邆立皮羅邆卒子邆羅顛立邆羅顛卒子顛之託立案顛之託新唐書作顛文託南詔既破劍川收野共俘顛之託徙永昌六施浪一詔也詔主施望欠初閣羅鳯據石和城俘施各皮而望欠援絶後與豐哶哶羅皮同伐蒙歸義又皆敗潰退保矣苴和城歸義稍從江口進兵脅其部落無㡬施望欠衆潰僅以家族之半西走永昌初聞歸義又軍於蘭滄江東去必取永昌不能容望欠計無所出有女名遺南以色稱却遣使求致遺南於歸義許之望欠遂渡蘭滄江終於䝉舍望欠弟望千當矣苴和城初敗之時北走吐蕃吐蕃立為詔歸於劍川為衆數萬望千生千傍傍生傍羅顛南詔既破劍川盡獲施浪部落傍羅顛脫身走瀘北今三浪悉平惟傍羅顛矣識案矣識即前所稱劍川矣羅識也子孫在蕃中案望千雖不標詔名而列於六詔八詔之間則以當第七詔也八䝉舍一詔也居蒙舍川在諸部落之南故稱南詔也姓䝉貞元年中獻書於劍南節度使韋臯自言本永昌沙壺之源也南詔八代祖舍龍生龍獨羅亦名細奴邏當髙宗時遣首領數詣京師朝參皆得召見賞錦袍錦袖紫袍細奴邏生邏盛炎炎生盛邏皮盛邏皮生閣羅鳯案唐書盛邏皮下尚有皮邏閣一代此本葢有脫文當天后時邏盛入朝其妻方娠行次姚州生盛邏皮邏盛炎聞而喜曰吾且有子承繼身到漢地死無憾矣既至謁見大䝉恩奬勑鴻臚安置賜錦袍金帶繒綵數百疋歸本國開元初卒其子盛邏皮立朝廷授持進臺登郡王知沙壺州刺史長男閣羅鳯授持進兼楊瓜州刺史次男成節度䝉舍州刺史次男崇江東刺史次男成進䨇祝州刺史初炎閣未有子案唐書炎閣為邏盛炎長子盛邏皮之兄養閣羅鳯為子閣羅鳯復歸蒙哶故名承炎閣後亦不改天寳四載閣羅鳯長男鳯伽異入朝宿衞授鴻臚少卿七載䝉歸義卒案唐書䝉歸義即皮羅閣乃唐所賜名也閣羅鳯立朝廷冊襲雲南王矣伽異大卿兼楊瓜州刺史閣羅鳯攻石橋城擒施谷皮討越析梟于贈西開尋傳南通驃國及張乾陁陷姚州鮮于仲通戰江口遂與中原隔絶閣羅鳯嘗謂後嗣恱歸皇化但指大和城碑及表疏舊本呈示漢使足以雪吾前過也鳯伽異先死大厯四年閣羅鳯卒伽異長男異牟尋繼立生尋夢凑一名閤勸異牟尋每歎地卑夷雜禮義不通隔越中華杜絶聲教遂獻書檄寄西川節度使韋臯韋臯答牟尋書申以朝廷之命牟尋不謀於下隂決大計遂三路發使冀有一達一使出安南一使出西川一使由黔中案此五字原本脫據唐書補入貞元十年三使悉至闕下朝廷納其誠欵許其歸化節度恭承詔㫖專遣西川判官案唐書作廵官崔佐時親信數人越雲南與牟尋盟於玷蒼山下誓文四本内一本進獻一本異牟尋置於玷蒼山下神祠石函内一本納於祖父等廟一本置府庫中以示子孫不令背逆不令侵掠臣咸通四年正月奉本使尚書蔡襲意㫖令書吏寫蠻王異牟尋誓文數本並書牒繫於車弩上飛入賊營臣切覽牟尋誓文立盟極切今南蠻子孫違負前誓伏料天道必誅容臣視於江源訪覔其誓文續俟寫錄真本進上案異牟尋誓文今附卷末而此云待訪覔續寫者葢其初作此篇時尚未得誓文故所言如此其後訪覓附入而此本未及刋削遂前後互異其說耳蠻書卷三
