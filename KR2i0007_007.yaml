body:
  text: 蠻書卷七唐樊綽撰雲南管内物産第七從曲靖州已南滇池已西土俗唯業水田種麻豆黍稷不過町疃水田每年一熟從八月穫稻至十一月十二月之交便於稻田種大麥三月四月即熟收大麥後還種粳稻小麥即於岡陵種之十二月下旬已抽節如三月小麥與大麥同時收刈其小麥麪軟泥少味大麥多以為麨别無他用醖酒以稻米為麴者酒味酸敗每耕田用三尺犂格長丈餘兩牛相去七八尺一佃人前牽牛一佃人持按犂轅一佃人秉耒蠻治山田殊為精好悉被城鎮蠻將差蠻官遍令監守催促如監守蠻乞酒飯者察之杖下捶死每一佃人佃疆畛連延或三十里澆田皆用源泉水旱無損收刈已畢官蠻據佃人家口數目支給禾稻其餘悉輸官蠻地無桑悉養柘蠶遶樹村邑人家柘林多者數頃聳幹數丈三月初蠶已生三月中蠒出抽絲法稍異中土精者為紡絲綾亦織為錦及絹其紡絲入朱紫以為上服錦文頗有密緻竒采蠻及家口悉不許為衣服其絹極麄原細入色案原細二字未詳製如衾被庶賤男女許以披之亦有刺繡蠻王并清平官禮衣悉服錦繡皆上綴波羅皮南蠻呼大蟲為波羅密俗不解織綾羅自太和三年蠻賊㓂西川虜掠巧兒及女工非少如今悉解織綾羅也自銀生城柘南城尋傳祁鮮已西蕃蠻種並不養蠶唯收婆羅樹子破其殻中白如栁絮組織為方幅裁之籠頭男子婦女通服之驃國彌臣諾悉皆披羅段其鹽出處甚多煎煮則少安寧城中皆石鹽井深八十尺城外又有四井勸百姓自煎天寳八載𤣥宗委特進何履光統領十道兵馬從安南進軍伐蠻國十載已收復安寧城并馬援銅柱本定疆界在安寧去交阯四十八日程安寧郡也何履光本是邕管貴州人舊嘗任交容廣三州節度天寳十五載方收蠻王所坐大和城之次屬安祿山造逆奉𤣥宗詔㫖將兵赴西川遂寢其收復案此條乃叙次鹽井所在其天寳八載以下一百十四字於上下語意不相屬疑亦他處之文因安寕城而錯誤在此升麻通海已來諸爨蠻皆食安寜井鹽唯有覽賧城内郎井鹽潔白味美惟南詔一家所食取足外輒移竈緘閉其井瀘南有美井鹽河賧白崖雲南已來供食昆眀城有大鹽池比陷吐蕃蕃中不解煮法以鹹池水沃柴上以火焚柴成炭即於炭上掠取鹽也貞元十年春南詔收昆眀城今鹽池屬南詔蠻官煮之如漢法也東蠻磨些蠻諸蕃部落共食龍怯河水中有鹽井兩所歛尋東南有傍彌潛井沙追井西北有若耶井諱溺井劔川有細諾鄧井麗水城有羅苴井長傍諸山皆有鹽井當土諸蠻自食無𣙜稅蠻法煮鹽咸有法令顆鹽每顆約一兩二兩有交易即以顆計之茶出銀生城界諸山散收無採造法䝉舍蠻以椒薑桂和烹而飲之荔枝檳榔訶黎勒椰子桄榔等諸樹永昌麗水長傍金山並有之甘橋大釐城有之其味酸寜賧有橋大如覆杯案橋疑橘字之訛麗水城又出波羅蜜果大者若漢城甜𤓰引蔓如蘿蔔十一月十二月熟皮如蓮房子處割之色微紅似甜𤓰香可食或云此即思難也南蠻以此果為珍好禄江左右亦有波羅密果樹髙數十丈大數圍生子味極酸䝉舍永昌亦有此果大如甜𤓰小者似橙柚割食不酸即無香味土俗或呼為長傍果或呼為思漏果亦呼思難果其次有雄黄蒙舍川所出青木香永昌出其山多青木香山在永昌南三日程濩歌諾木麗水山谷出大者如臂小者如三指割之色如黄蘖土人及賧蠻皆寸截之丈夫婦女久患腰腳者浸酒服之立見効驗藤䕳生永昌河賧縁彼處無竹根以藤漬經數月色光赤彼土尚之案此條文義未明疑有訛脫孟灘竹長傍出其竹節度三尺柔細可為索亦以皮為麻野桑木永昌巴西諸山谷有之生於石上及時月擇可為弓材者先截其上然後中割之兩向屈令至地候木性定斷取為弓不施筋漆而勁利過於筋弓蠻中謂之䐜弓者是也案新唐書南詔傳作暝弓生金出金山及長傍諸山藤充北金寳山土人取法春冬間先於山上掘坑深丈餘闊數十歩夏月水潦降時添其泥土入坑即於添土之所沙石中披㨂有得片塊大者重一觔或至二觔小者三兩五兩價貴於麩金數倍然以蠻法嚴峻納官十分之七八其餘許歸私如不輸官許遞相告麩金出麗水盛沙淘汰取之沙賧法男女犯罪多送麗水淘金長傍川界三面山並出金部落百姓悉納金無别稅役征徭銀會同川銀山出錫瑟瑟山中出禁戢甚嚴琥珀永昌城界西去十八日程琥珀山掘之去松林甚逺片塊大重二十餘斤貞元十年南詔䝉異牟尋進獻一塊大者重二十六斤當日以為罕有也馬出越賧川東面一帶崗西向地勢漸下乍起伏如畦畛者有泉地美草宜馬初生如羊羔一年後紐莎為攏頭縻繋之三年内飼以米清粥汁四五年稍大六七年方成就尾髙尤善馳驟日行數百里本種多驄故代稱越賧驄近年以白為良藤充及申賧亦出馬次賧滇池尤佳東爨烏蠻中亦有馬比於越賧皆少一切野放不置槽櫪唯陽苴哶及大釐登川各有槽櫪餵馬數百匹犀出越賧髙麗其人以陷穽取之每殺之時天雨震雷暴作尋傳川界殼弄川界亦出犀皮蠻排甲并馬統備案新唐書作統倫馬騎甲仗多用犀革亦雜用牛皮負排羅苴已下未得繋金佉苴者悉用犀革為佉苴皆朱漆之大蟲南詔所披皮赤黒文深炳然可愛云大蟲在髙山窮谷者則佳如在平川文淺不任用麝香出永昌及南詔諸山土人皆以易交貨幣沙牛雲南及西爨故地並只生沙牛俱緣地多瘴草深肥牛更蕃生犢子天寳中一家便有數十頭通海已南多野水牛或一千二千為羣彌諾江巴西出犛牛開南已南養處大於水牛一家數頭養之代牛耕也鹿傍西洱沙諸山皆有鹿龍尾城東北息龍山南詔養鹿處要則取之覽賧有織和川及鹿川龍足鹿白晝三十五十羣行齧草鯽魚䝉舍池鯽魚大者重五斤西洱河及昆池之南接滇池冬月魚鴈鴨半雉水扎鳥遍於野中水際大雞永昌雲南出重十餘斤觜距勁利能取鸇鶚䳒鵲鳧鴿鴝鵒之𩔖象開南巴南多有之或捉得人家多養之以代耕田也猪羊貓犬騾驢豹鵝鴨諸山及人家悉有之但食之與中土稍異蠻不待烹熟皆半生而喫之大羊多從西羌鐵橋接吐蕃界三千二千口將來博易鐸鞘狀如刀㦸殘刃積年埋在髙土中亦有孔穴傍透朱笴出麗水裝以金穹鐵簜所指無不洞也南詔尤所寳重以名字呼者有六一曰祿婆摩求二曰虧雲孚三曰鐸四曰鐸摩那五曰同鐸案惟有五名疑闕其一昔時越析詔于贈有降天鐸鞘後部落破敗盛羅皮得之今南詔蠻王出軍手中雙執者是也貞元十年使清平官尹輔酋入朝獻其一鬱刀次於鐸鞘造法用毒藥蟲魚之𩔖又淬以白馬血經十數年乃用中人肌即死俗秘其法麤問得其由南詔劍使人用劍不問貴賤劍不離身造劍法鍛生鐵取迸汁如是者數次烹煉之劍成即以犀裝頭飾以金碧浪人詔能鑄劍尤精利諸部落悉不如謂之浪劍南詔所佩劍已傳六七代也槍箭多用斑竹出䝉舍白崖詔南山谷心實圓緊柔細極力屈之不折諸所出皆不及之蠻書卷七
