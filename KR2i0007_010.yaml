body:
  text: 蠻書卷十唐樊綽撰南蠻疆界接連諸蕃夷國名第十彌諾國彌臣國皆邊海國也呼其君長為壽彌諾面白而長彌臣面黑而短性恭謹每與人語向前一步一拜國無城郭彌諾王所居屋之中大柱雕刻為文飾以金銀彌臣王以木柵居海際水中以石獅子為屋四足仍以板蓋悉用香木百姓皆樓居披婆羅籠男女多好音樂樓兩頭置鼓飲酒即擊鼓男子攜手樓中蹈舞為樂在蠻永昌城西南六十日程太和九年曾破其國劫金銀虜其族三二千人配麗水淘金驃國在蠻永昌城南七十五日程閣羅鳯所通也其國用銀錢以青磚為圓城周行一日程百姓盡在城內有十二門當國王所居門前有一大像露坐髙百餘尺白如霜雪俗尚廉恥人性和善少言重佛法城中並無宰殺又多推步天文若有兩相訴訟者王即令焚香向大像思惟其非便各引退其或有災疫及不安穩之事王亦焚香對大像悔過自責男子多衣白氎婦人當頂為髙髻以金銀真珠為飾著青婆羅裙又披羅段行必持扇貴家婦皆三人五人在傍持扇有移信使到蠻界河賧則以江豬白氎及琉璃罌為貿易案罌原本作盟貿易原本作加今從新唐書驃國傳改正與波斯及婆羅門鄰接西去舍利城二十日程據佛經舍利城中天竺國也近城有沙山不生草木恆河經云沙山中過然則驃國疑東天竺也蠻賊太和六年劫掠驃國虜其衆三千餘人𨽻配柘東令之自給今子孫亦食魚蟲之類是其種末也咸通四年正月六日寅時有一胡僧裸形手持一仗束白絹進退為步在安南羅城南面本使蔡襲當時以弓飛箭當胸中此設法胡僧衆蠻扶舁歸營幕城內將士無不鼓譟崑崙國正北去蠻界西洱河八十一日程出青木香檀香紫檀香檳榔琉璃水精蠡坯等諸香藥珍寶犀牛等蠻賊曾將軍馬攻之被崑崙國開路放進軍後鑿其路通江決水淹浸進退無計餓死者萬餘不死者崑崙去其右腕放回大秦婆羅門國界永昌北與彌諾國江西正東案此句疑有脫誤安西城樓接界東去蠻陽苴咩城四十日程蠻王善之街來其國案此八字文不相屬疑有脫誤小婆羅門與驃國及彌臣國接界在永昌北七十四日程俗不食牛肉預知身後事出見齒蠟越諾案此句未詳共大耳國往來蠻夷善之信共國案此七字文亦不屬夜半國在蠻界蒼望城東北隔麗水城其部落婦人唯與鬼通能知吉凶禍福本土君長崇信蠻夷往往以金購之要知善惡昆眀牂牁界接麗水相近蠻賊曾攻不得至今銜恨之昆眀牂牁本使臣蔡襲嘗奏請分布軍馬從黔府路入案此條之首當有脫文女王國去蠻界鎮南節度三十餘日程其國去歡州一十日程往往與歡州百姓交易蠻賊曾將二萬人伐其國被女王藥箭射之十不存一蠻賊乃回水真蠟國陸真臘國與蠻鎮南相接蠻賊曾領馬軍到海畔見蒼波洶湧悵然收軍郤回案此篇乃載南蠻接壤之國自此以下皆别説他事蓋附録之文傳寫失其標目耳今各低一格以别之咸通四年六月六日蠻賊四千餘人草賊朱道古下二千人共棹小船數百隻收郡州案通鑑考異引唐實録以郡州為交州國史補亦同是郡州乃州名也得安南都押衙張慶宗杜存陵武安州刺史陳行餘案新唐書地理志武安州屬安南都護府以航舶戰船十餘隻築損蠻賊船三十來隻沈溺臣九月二十一日於藤州見安南虞候史孝慜并得兵馬使徐從雅信蠻賊不解水悉皆溺死吐蕃鐵橋節度本屬吐蕃貞元十年蒙異牟尋攻破今並屬蠻管案吐蕃鐵橋節度以下二十五字文義與上文不相屬疑亦他處錯簡在此異牟尋曾詐臣事吐蕃吐蕃遂封異牟江尋西卑賤案以下皆紀册封南詔之事此二十字文不相屬蓋所紀册封一事佚其前段而此條佚其後段耳今不可考姑仍其舊因遣曹長段南羅各同倫判官趙伽寬等九人與南詔清平官尹輔酋及親信李羅札將大馬二十匹迎子弟羽儀六人沿路視事十五日至安南城城使段伽諾出步軍二百隊馬軍一百隊夾道排立帶甲馬六十隊引前步槍五百人隨後去城五十里迎候十九日到曲驛鎮使楊盛出馬軍一百三十隊步軍一百七十隊夾道排立帶甲馬二百人引前步槍三百人隨後去驛一十里迎接二十一日過吹舍川首領父老百餘人蠻夷百姓數千人路傍羅列而拜馬上送酒雲南節度將五十匹馬來迎二十三日到雲南城節度蒙酋物出馬軍一百隊步軍三百人夾道排立帶甲馬一十隊引前步槍五百人隨後去城一十里迎候門前父老二百餘人吐蕃封王數人在路迎拜是日南詔使大軍將兼户曹長王各苴來迎二十四日到白崖城城使尹瑳出馬軍一百隊步軍二百隊夾路排立引馬六十匹步槍五百人去城五里迎候南詔遣大軍將李鳯嵐將細馬一千匹并伎樂來迎渠斂道中路客館館前父老二百餘人蠻夷百姓五六十人路迎馬前大軍將喻于㑫出馬步軍三百隊夾路排立引馬六十匹步槍三百人去城五里迎候南詔妹李波羅諾將細馬一十匹來迎入龍尾城客館南詔異牟尋叔父阿思將大馬二百匹來迎二十六日過大和城南詔異牟尋從父兄蒙細羅勿案羅勿原本作四勾今據新唐書改正及清平官李異榜大軍將李千傍等將細馬六十匹來迎皆金鍐玉珂拂髦振鐸案振原本作根今據新唐書改正夾路馬步軍排隊二十餘里南詔蒙異牟尋出陽苴咩城五里迎先飾大象一十二頭引前以次馬軍隊以次伎樂隊以次子弟持斧鉞南詔異牟尋衣金甲披大蟲皮執雙鐸男蒙閣勸在傍步槍千餘人隨後馬上祗揖而退原缺日授册原缺貞元十年十月二十七日陽苴咩城具儀注設位旌節當庭東西特立南詔異牟尋及清平官已下各具儀禮面北序立宣慰南詔使南向立册立南詔使南向立宣敕書讀册文訖案此條册字原本俱訛作開今據文改正相者引南詔蒙異牟尋離位授册次受貞元十年厯日南詔及清平官已下稽顙再拜手舞足蹈慶退而言牟尋曾祖父開元中册雲南王祖父天寶中又蒙册襲雲南王自隔大國向五十年貞元中皇帝聖眀念録微效今又賜禮命復覩漢儀對揚天休實感心肺其日樓下大會又坐上割牲用銀平脫馬頭盤二面牟尋曰此是天寶初先人任鴻臚少卿宿衛時案衛上原脫宿字今補入開元皇帝所賜比寶藏不敢用得至今又伎樂中有老人吹笛婦人唱歌各年近七十餘牟尋指之曰先人歸蕃來國開元皇帝賜胡部及龜茲音聲各兩部今死亡零落盡只餘此二人在國酒既行牟尋自捧杯擎跽勸讓册立使袁滋引杯灑酒曰南詔當深思祖宗緒業堅守誠信為西南藩屏使後嗣有以傳繼也異牟尋噓嘻曰敢不承命其年十一月七日事畢發陽苴咩城雲南王蒙異牟尋以清平官尹輔酋十七人奉表謝恩進納吐蕃贊普鍾印一面案通鑑吐蕃謂弟為鍾南詔服吐蕃時封為贊普鍾日東王並獻鐸鞘浪川劍生金瑟瑟牛黃琥珀白氎紡絲象牙犀角越賧馬統備甲馬并甲文金皆方土所貴之物也仍令大軍將王各苴柘東副使杜伽諾具牛羊領鞍馬及丁夫三百人提荷食物其年十一月二十四日送至石門從石門更十日程到茂州自後南蠻移心向化遂與吐蕃讎隙伏緣數年之間當州鎮釐革南詔入朝人數縱有經過者郵傳殘薄兼緣安南大中年案原本作大中牟今據唐書及通鑑宣宗大中十三年杜悰為西川節度使奏請節減南蠻習學子弟及入貢傔從人數南詔怒自是頗擾邊境書中所説當指此事牟字蓋年字之訛謹改正奏請隔絶南詔往來通好謹按尚書云撫我則后虐我則讎本使蔡襲去年正月十四日內四度中矢石家口并元隨七十餘人悉殞於賊所臣長男韜及奴婢一十四口並陷蠻陬臣夙夜憂憶本使蔡襲行坐痛心切以蠻賊尚據安南今江源并諸州各自固守其首領將吏去年春夏頻請救兵自是海門案安南既陷以海門鎮為行交州不與發遣并不給與戈甲弓弩致令蠻賊侵掠州軍臣以南蠻從古及今凡虜掠諸處百姓夷獠隸他處則貴江源首領巳下知其配隸之事固惜副卿必合戳力齊心共禦蠻夷之殘暴案臣以下五十一字文義未詳且不相屬當有脫誤又黔涇巴夏四苗邑衆咸通三年春三月八日因入賊朱道古營柵竟日與蠻賊將大羌楊阿觸楊酋盛柘東判官楊忠義話得百姓立邊城自為一國之由祖乃盤瓠之後其蠻賊楊羌等云綻盤古之後案綻字有訛此時緣單車問罪莫能若事案若字有訛咸通五年六月左授夔州都督府長史問蠻夷巴夏四邑根源悉以録之寄安南諸大首領詳録於此為蠻志一十卷事庶知南蠻首末之序案以下六條又附録中旁及之文今再低一格以别之謹按後漢南蠻傳昔髙辛氏有戎寇吳將軍為患其侵暴乃下敕曰有人得戎寇吳將軍頭者賜金百鎰封邑萬家妻以少女時帝有犬名盤瓠後遂之寇所因嚙得吳將軍頭來其寇遂平帝大喜因以官爵賚賜犬不起帝少女聞之奏曰皇帝信不可失深憂犬之為患帝曰當殺之女曰殺有功之犬失天下之信矣帝曰善乎因請匹之帝不得巳乃以配盤瓠盤瓠得女負入南山處於石室其處險阻不通人迹後生十二子六男六女自相匹偶緝以草木皮為衣服帝賜以南山仍起髙欄為居止之其後滋蔓自為一國案此文與今後漢書南蠻傳不同按王通明廣異記云髙辛時人家生一犬初如小特主怪之棄於道下七日不死禽獸乳之其形繼日而大主人復收之當初棄道下之時以盤盛葉覆之因以為瑞遂獻於帝以盤瓠為名也後立功嚙得戎寇吳將軍頭帝妻以公主封盤瓠為定邊侯公主分娩七塊肉割之有七男長大各認一姓今巴東姓田雷再向蒙旻叔孫氏也其後苗裔熾盛從黔南逾昆湘髙麗之地自為一國幽王為犬戎所殺即其後也盤瓠皮骨今見在黔中田雷等家時祀之巴中有大宗廩君之後也漢書巴郡本有四姓巴氏繁氏陳氏鄭氏皆出於武落鍾離山其山黑赤二穴巴氏之子生於赤穴繁陳鄭三姓生於黑穴未有君長俱事鬼乃共擲劍於石穴約能中者奉以為君巴氏子務相獨中之又令乘土船下夷水到鹽陽約能浮者為君務相獨浮因立務相為君也遂有神女謂廩君曰此地廣大魚鹽所出請為留之廩君不許神女暮來取宿晨則化為飛蟲羣蔽日月天地晦冥積十餘日廩君伺其便射之天乃開朗廩君方定居於夷水三姓皆臣事之廩君死魂魄化為白虎及惠王并巴蜀以巴夷為蠻夷君尚女其人有罪得以爵除出賦二千一十六百萬錢三嵗一出義賦一千八百錢人出幏布八丈二尺雞羽三十鍭也案此文與今後漢書南郡蠻傳稍有異同巴氏祭其祖擊鼓而祭白虎之後也按華陽國志秦昭王時白虎為害多傷人乃購之曰有殺得白虎者封邑千家繼以金帛於是朐忍夷廖仲藥等以竹弩射之中而死秦遂刻石為夷人立盟曰夷人頃田不租十妻不算傷人不論秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人遂因號虎夷一名弦頭剛勇頗有先人之風案所引華陽國志與今本文稍不同按秦紀始皇十八年巴都出大人長二十五丈一夫兩妻號曰左右也是故左思蜀都賦云剛勇生其方風謠尚其武按夔城圖經云夷事道蠻事鬼初喪鼙鼓以為道哀其歌必號其衆必跳此乃盤瓠白虎之勇也俗傳正月初夜鳴鼓連腰以歌為踏蹄之戲五月十五日招命騎健畫楫圖舟十船同角千人齊聲唱鼓扣舷沿江騰波而下俗三月八日為大節以陳祠享振鐸擊鼓師舞為敬也夷蛋居山谷蛋即蠻之别名巴夏居城郭與中土風俗禮樂不同雲南詔蒙異牟尋與中國誓文臣今録白進獻貞元十年嵗次甲戌正月乙亥五月巳卯雲南詔異牟尋及清平官大軍將與劍南西川節度使崔佐時案崔佐時乃韋臯所遣西川節度巡官不可直稱節度使疑有脫文謹詣玷蒼山北上請天地水三官五嶽四瀆及管川谷諸神靈同請降臨永為證據念異牟尋乃祖乃父忠赤附漢去天寶九載被姚川都督張乾陀等離間部落因此與漢阻絶經今四十三年與吐蕃洽和為兄弟之國吐蕃贊普册牟尋為日東王亦無二心亦無二志去貞元四年奉劍南節度使韋臯僕射書具陳漢皇帝聖眀懷柔好生之德七年又蒙遣使段忠義等招諭兼送皇帝敕書遂與清平官大軍將大首領等密圖大計誠矢天地發於禎祥所管部落誓心如一去年四月十三日差趙莫羅眉揚大和眉等賫僕射來書三路獻表願歸清化誓為漢臣啓告祖宗眀神鑒照忠款今再蒙皇帝蒙劍南西川節度使韋臯僕射遣巡官崔佐時傳語牟尋等契誠誓無遷變謹請西洱河玷蒼山神祠監盟牟尋與清平官洪驃利時大軍將段盛等請全部落歸附漢朝山河兩利即願牟尋清平官大軍將等福祚無疆子孫昌盛不絶管諸賧首領永無離二興兵動衆討伐吐蕃無不尅捷如會盟之後發起二心及與吐蕃私相會合或輒窺侵漢界內田地即願天地神祇共降災罰宗祠殄滅部落不安災疾臻湊人户流散稼穡産畜悉皆減耗如蒙漢與通和之後有起異心窺圖牟尋所管疆土侵害百姓致使部落不安及有患難不賜救恤亦請唯此誓文神祇共罰如蒙天漢和通之後更無異意即願大漢國祚長久福盛子孫天下清平永保無疆之祚漢使崔佐時至益州不為牟尋陳説及節度使不為奏聞牟尋赤心歸國之意亦願神祇降之災今牟尋率衆官具牢醴到西洱河奏請山川土地靈祇請漢使計會發動兵馬同心力共行討伐然土蕃神川崑崙會同巳來不假天兵牟尋盡收復鐡橋為界歸漢舊疆宇謹率羣官虔誠盟誓共尅金契永為誓信其誓文一本請劔南節度隨表進獻一本藏於神室一本投西洱河一本牟尋留詔城內府庫貽誡子孫伏惟山川神祇同鑒誠懇某年六月二十一日奏狀今謹録白獻進案後題貞元十年奏狀而此闕其年亦刋削不盡之文東蠻和使楊傳盛等六月十八日到安南齎蠻王蒙異牟尋與臣絹書一封并金鏤合子一具合子有綿有當歸有硃蒙有金石東蠻國王是故雲南詔王閣羅鳯孫姓蒙名異牟尋遺前件使齎表詣闕於今月十八日到兼得其王牟尋與臣書逺陳誠懇并金鏤合子一枚其使味言送合子中有綿者以表柔服不敢更與為生梗有當歸者永願為內屬有硃砂者蓋獻丹心向闕有金者言歸義之意如金之堅又言蠻王蒙異牟尋積代唐臣遍霑皇化天寶年中其祖閣羅鳯被邉將張乾陀讒搆部落驚懼遂違聖化北向歸投吐蕃贊普以贊普年少信任讒佞欲併其國蒙尋逺懷聖化北向請命故遣和使乞釋前罪願與部落竭誠歸附緣道遐阻伏恐和使不達故三道遣一道出石山從戎州路入一道出牂牁從黔府路入一道出夷獠從安南路入其楊傳盛等今年四月十九日從蠻王蒙異牟尋所理大和城發六月十八日到安南府其和使楊傳盛年老染瘴瘧未得進發臣見醫療候獲稍損即差專使領赴闕庭其使云異牟尋自祖父久背國恩今者願棄豺狼之思歸聖人之德此皆陛下雨露之澤及外夷故蠻徼遐荒願為內屬臣忝領蕃鎮目覩升平踴躍欣歡倍常萬幸有蠻王與臣書及金鏤合子等謹差十將李茂等隨表奉進謹奏貞元十年六月二十一日安南都護充管內節度觀察處置等使檢校工部尚書御史大夫臣趙昌奏狀貞元十年南詔蒙異牟尋請歸附聖唐願充內屬盟立誓言永為西南藩屏臣今於安南郡州溪源首領耆老處借得故蠻王蒙異牟尋誓文一本安南都護趙昌貞元十年奏狀白一本伏以故南詔蒙異牟尋嗣孫惠龍不守祖父留訓既違盟誓自掇禍殃尚未悛心猶恣狂暴全軀蟻聚之衆攻劫雍交之人五載興兵三來虜掠顧生靈之何負受塗炭之苦辛臣去年正月二十九日巳録蠻界程途及山川城鎮六詔始末諸種名數風俗條教土宜物産六􅚲名號連接諸蕃共纂録成十卷於安南郡州江口附襄州節度押衙張守忠進獻今臣謹録故蠻王蒙異牟尋貞元十年誓文及趙昌奏狀白隨表奉進以上蠻書卷十
