  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0007_WYG_001-1a, image: WYG0464/WYG0464-0003a.png}
body:
  text: 蠻書卷一唐樊綽撰雲南界內途程第一安寧城後漢元鼎二年伏波將軍馬援立銅柱定疆界之所案馬援定交址為後漢光武帝建武十九年事元鼎乃西漢武帝紀年後漢並無此號蓋樊綽失於考據之誤去交址城池四十八日程漢時城壁尚存碑銘並在苴咩上音斜下符差切城從安南府城至蠻王見坐苴咩城水陸五十二日程只計日無里數從安南上水至峰州兩日至登州兩日至忠誠州三日至多利州兩日至竒富州兩日至甘棠州兩日至下步三日至黎武賁柵四日至賈勇步五日已上二十五日程並是水路大中初悉屬安南管係其刺史並委首領勾當大中八年經略使苛暴川洞離心疆內首領旋被蠻賊誘引數處陷在賊中從賈勇步登陸至矣符管一日從矣符管至曲烏館一日至思下館一日至沙隻館一日至南場館一日至曲江館一日至通海城一日至江川縣一日至進寧館一日至鄯闡柘東城一日案柘東舊唐書及通鑑俱作拓東胡三省云言開拓東境也新唐書作柘從木與此同從柘東節度城至寧實館一日安寧館本是漢寧郡城也從安寧城至龍和館一日至沙雌館一日至曲館一日至沙卻館一日至求贈館一日至雲南驛一日至波大驛一日至白嚴驛一日至龍尾城一日李謐伐蠻於龍尾城誤陷軍二十萬衆今為萬人冢至陽案陽新唐書作羊苴咩城一日蠻王從太和城移在苴咩城案蠻王至咩城十一字原本誤入正文今改正自西川成都府至雲南蠻王府州縣館驛江嶺開塞並里數計二千七百二十里從府城至雙流縣二江驛四十里至蜀州新津縣三江驛四十里至延貢驛四十里至臨卭驛四十里至順城驛五十里至雅州百丈驛四十里至名山縣順陽驛四十里至巖道縣延化驛四十里從延化驛六十里至管長賁關從奉義驛至雅州界榮經縣南道驛七十五里至漢昌六十里案此句上有脫文屬雅州地名葛店至皮店三十里至黎州潘倉驛五十里至黎武城六十里至白土驛三十五里過漢源縣十里至通望縣木筤驛四十里去大渡十里至望星驛四十五里至清溪關五十里至大定城六十里至達士驛五十里黎巂二州分界至新安城三十里至菁口驛六十里至滎水驛八十里至初裏驛三十五里至臺登城平樂驛四十里古縣今廢至蘇祁驛四十里古縣至巂州三阜城四十里州城在三阜山上至沙也城八十里故巂州太和年移在臺登至儉浪驛八十里至俄淮嶺七十里下此嶺入雲南界已上三十二驛計一千八百八十里案上文惟三十驛計一千四百九十五里與此數不符並屬西川管差官人將軍專知驛務雲南蠻界從巂州俄淮嶺七十里至菁口驛三十里至芘驛六十里至會川鎮差蠻三人充鎮五十五里至目集館七十里至會川有蠻充刺史稱會川都督從口集驛至河子鎮七十里瀘江乘皮船渡瀘水從河子鎮至末柵館五十里至伽毗館七十里至清渠鋪八十里渡繩橋雲南行記云渠桑驛至藏傍館七十四里至陽褒館六十里過大嶺險峻極從陽褒至弄棟城七十里本是姚州舊屬西川天寶九載為姚州都督張乾案乾唐書作虔陀附蠻所陷從弄棟城至外彌蕩八十里從外彌蕩至求贈館案此句下有脫文至雲南城七十里至波大驛四十里至渠藍趙館四十里至龍尾城三十里從龍尾城至陽苴咩城五十里以上一十九驛計一千五十四里案十九驛共計一千六十九里與此數亦不符南蠻因姚州之後屬蠻管係從雍州路至蠻苴咩城從黔州路至蠻苴咩城兩地途程臣未諳委伏乞下堂帖令分析緣南蠻姦猾攻劫在心田桑之餘便習鬭敵若不四面征戰凶惡難悛所以録其城鎮川原塵黷宸扆或冀破其蟻聚之衆永清羌虜之夷臣披瀝懇忱無任隕越之至案此條乃附載陳説之詞如後世著書之案語原本誤連正文遂令文義格礙今低一格以别之後仿此從石門外出魯望崑州至雲南謂之北路黎州清溪關出卭部過會通至雲南謂之南路從戎州南十日程至石門上有隋初刋記處云開皇五年十月二十五日兼法曹黃榮領始益二州石匠鑿石四孔各深一丈造偏梁橋閣通越析州津州蓋史萬嵗南征出於此也越析州今西河河東一日程越析州咨長故地也津州未詳其處天寶中鮮于仲通南溪下兵亦是此路後遂閉絶僅五十年來貞元十年南詔立功歸化朝廷發使册命而卭部舊路方有兆吐蕃侵鈔隔關其年七月西川節度韋臯乃遣巡官監察御史馬益閉石門路量行館石門東崖石壁直上萬仞下臨朱提江流又下入地中數百尺惟聞水聲人不可到西崖亦是石壁傍崖亦有閣路橫濶一步斜亘三十餘里半壁架空欹危虛險其安梁石孔即隋朝所鑿也閣外至夔嶺七日程直經朱提江下上躋攀傴身側足又有黃蠅飛蛭毒蛇短狐沙虱之類石門外第三程至牛頭山山有諸葛古城館臨水名馬安渡上源從阿等路部落繞蒙夔山又東折與朱提江合第五程至生蠻阿部落第七程至蒙夔嶺嶺當大漏天直上二十里積陰凝閉晝夜不分從此嶺頭南下八九里青松白草川路漸平第九程至魯望即蠻漢兩界舊曲靖之地也曲州靖州廢城及丘墓碑闕皆在依山有阿竿路部落過魯望第七程至竹子嶺嶺東有暴蠻部落嶺西有盧鹿蠻部落第六程至生蠻磨彌殿部落此等部落皆東爨烏蠻也男則髮髻女則散髮見人無禮節拜跪三驛四驛乃與華通大部落則有鬼主百家二百牛馬案此句未詳無布帛男女悉披牛羊皮第九程至制長館於是始有門閣廨宇迎候供養之禮皆漢地凡從魯望行十二程方始到柘東黎州南一百三十里有清溪峽乾元二年置關關外三十里即嶲州界也行三百五十里至卭部川故卭部縣之地也下南一百三十里至臺登西南八十里至普安城劍南西川節度使重兵大將鎮焉臺登直北去保塞城八十里吐蕃謂之北谷天寶以前嶲州栁強鎮也自入吐蕃更增修嶮因城下有路向曩恭地谷東南一百三十里至羅山城天寶以後吐蕃新築非國家舊城貞元十年十月西川節度兵馬與雲南軍併力破保塞大定獻俘闕下十一年正月西川又拔羅山置兵固守卭南驛路由此遂通臺登城直西有西望川行一百五十里入曲羅瀘水從北來至曲羅縈迥回三曲每中間皆有磨些部落以其負阻深險承上莫能攻討案承上蠻官名見後文瀘水從曲羅南經劍山之西又南至會同川邉水左右總謂之西蠻卭部東南三百五十里至勿鄧部落大鬼主夢衝地方濶千里卭部一姓白蠻五姓烏蠻初止五姓在卭部臺登巾間皆烏蠻也婦人以黑繒為衣其長曳地又束欽兩姓在北谷皆白蠻三姓皆屬夢衝內受恩賞於國外私於吐蕃貞元七年節度使韋臯使嶲州刺史蘇隗殺夢衝因别立大鬼主勿鄧南七十里有兩姓部落案此下當有闕文蠻書卷一
