body:
  text: 蠻書卷八唐樊綽撰蠻夷風俗第八其蠻丈夫一切披氈其餘衣服略與漢同唯頭囊特異耳南詔以紅綾其餘向下皆以皂綾絹其制度取一幅物近邊撮縫為角刻木如樗蒲頭實角中總髪於腦後為一髻即取頭囊都包裏頭髻上結之羽儀已下及諸動有一切房甄别者案此句疑有訛脫然後得頭囊若子弟及四軍羅苴已下則當額絡為一髻不得戴囊角當頂撮髽髻並披氈皮俗皆跣足雖清平官大軍將亦不以為恥曹長已下得繫金佉苴案原本闕金字今據新唐書增入或有等第戰功褒奬得繫者不限常例貴緋紫兩色得紫後有大功則得錦又有超等殊功者則得全披波羅皮其次功則胸前背後得披而闕其袖又以次功則胸前得披并闕其背謂之大蟲皮亦曰波羅皮謂腰帶曰佉苴婦人一切不施粉黛貴者以綾錦為裙襦其上仍披錦方幅為飾兩股辮其髮為髻髻上及耳多綴真珠金貝瑟瑟琥珀貴家僕女亦有裙衫常披氈及以繒帛韜其髻亦謂之頭囊南詔有妻妾數百人總謂之詔佐清平官大軍將有妻妾數十人俗法處子孀婦出入不禁少年子弟暮夜遊行閭巷吹壺盧笙或吹樹葉聲韻之中皆寄情言用相呼召嫁娶之夕私夫悉來相送既嫁有犯男子格殺無罪婦人亦死或有强家富室責資財贖命者則遷徙麗水瘴地終棄之法不得再合每年十一月一日盛會客造酒醴殺牛羊親族鄰里更相宴樂三月内作樂相慶惟務追歡户外必設桃茢如嵗旦然改年即用建寅之月其餘節日麤與漢同唯不知有寒食清眀耳每飲酒欲闌即起前席奉觴相勸有性所不能者乃至起前席扼腕的顙或挽或推情禮之中以此為重取生鵝治如膾法方寸切之和生胡瓜及椒榝㗖之謂之鵝闕土俗以為上味南詔家食用金銀其餘官將則用竹簞貴者飯以筯不匙賤者摶之而食一尺漢一尺三寸也一千六百尺為一里漢秤一分三分之一帛曰冪漢四尺五寸也田曰雙漢五畝也本土不用錢凡交易繒帛氈罽金銀瑟瑟牛羊之屬以繒帛冪數計之云某物色直若干冪凡人家所居皆依傍四山上棟下宇悉與漢同惟東西南北不取周正耳别置倉舍有欄檻腳髙數丈云避田鼠也上閣如車葢狀西爨及白蠻死後三日内埋殯依漢法為墓稍富室廣栽杉松䝉舍及諸烏蠻不墓葬凡死後三日焚屍其餘灰燼掩以土壤唯收兩耳南詔家則貯以金瓶又重以銀為函盛之深藏别室四時將出祭之其餘家或銅瓶鐵瓶盛耳藏之也言語音白蠻最正䝉舍蠻次之諸部落不如也但名物或與漢不同及四聲訛重大事多不與面言必使人往來達其詞意以此取定謂之行諾才勺反大蟲謂之波羅密亦名草羅犀謂之矣讀如咸帶謂之佉苴飯謂之喻鹽謂之賔鹿謂之識牛謂之舍川謂之賧谷謂之浪山謂之和山頂謂之葱路舞謂之伽傍加富也閣髙也諾深也苴俊也東爨謂城為弄謂竹為翦謂鹽為眗謂地為渘謂請為數謂酸為制言語並與白蠻不同每出軍征役每蠻各攜糧米一㪷五升各攜魚脯此外無供軍糧料者蠻軍憂糧易盡心切於戰出界後許行刦掠收奪州溪源百姓禾米牛羊等輩用軍之次面前傷刀箭許將息儻背後傷刀箭輒退者即刃其後案此條當在第九卷南蠻篇中疑傳冩者誤入於此蠻書卷八
