  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0007_WYG_006-1a, image: WYG0464/WYG0464-0021a.png}
body:
  text: 蠻書卷六唐樊綽撰雲南城鎮第六雲南城天寶中閣羅鳯所規置也嘗為信州地城池郭邑皆如漢制州中南北二十餘里東西四十五里帶邑及過山雖有三千餘户田疇多廢閭里少人諸葛亮分永昌東北置雲南郡斯即其故地也西隔山有品􅚲賧亦名清字川嘗為波州大池繞山長二十餘里波州廢地在池東南隅故渭北節度段子英此州人也故居墳墓皆在雲南東第二程有欠舍川大都部落第三程至石鼓驛舊化川也第四程至曲驛有大覽賧小覽賧漢舊覽州也弄棟城在故姚州川中南北百餘里東西三十餘里廢城在東巖山上當川中有平巖周回五六頃新築弄棟城在其上管雜蠻數部落悉無漢人姚州百姓陷蠻者皆被移𨽻逺處柘東城廣德二年鳯伽異所置也其地漢舊昆州故謂昆池東北有井邑城隍城西有漢城土俗相傳云是莊蹻故城城之東十餘里有穀昌村漢穀昌王故地也貞元十年南詔破西戎遷施順磨些諸種數萬户以實其地又從永昌以望苴子望外喻等千餘户分𨽻城傍以靜道路晉寧州漢滇河故地也在柘東城南八十里晉平川幅員數百里西爨王墓纍纍相望石城川味縣故地也貞觀中為郎州開元初改為南寧州州城即諸葛亮戰處故城也城中有諸葛亮所撰文立二碑背上篆文曰此碑如倒蠻為漢奴近年蠻夷以木搘柱案新唐書謂諸葛亮碑在柘東城與此不合蓋唐書之誤臣今春見安南兵馬使郭延宗曾奉使至柘東停住一月日館穀勤厚贈遺不輕案以上五句與上下文不相屬疑亦錯簡在此又有夔鹿弄川漢同勞縣故地也案舊唐書地理志郎州有同樂縣同勞疑即同樂之訛在龍河過川南百餘里石城南面有新豐川漢南寧州新豐縣故地也廢城墻塹猶在大小石城川同升麻川西川南有曲軛川漢南寧州同起縣也安寧鎮去柘東城西一日程連然縣故地也通海鎮去安寧西第三程至龍封驛驛前臨瘴川去柘東城八日程漢俞元縣故地也量水川案舊唐書地理志黎州有梁水縣量水蓋即梁水轉音之訛漢舊黎州今吐蕃呼為量水川通海城南十四日程至步頭從步頭船行沿江三十五日出南蠻夷人不解舟船多取通海城路賈勇步入真登州林西原取峰州路行量水川西南至龍河又南與青木香山路直南至崑崙國矣寧北城在漢桑榆縣之東境也本無城池今以浪人詔矣羅君舊宅為理所東地有野共川北地有虺川又北有匱川又北有郎婆川又北有桑川即至鐵橋城北九賧川又西北有羅眉川又西牟郎共城又西至傍彌潛城西有鹽井鹽井西有斂尋城皆施蠻順蠻部落今所居之地也又西北至聿賫城又西北至弄視川鐵橋城在劍川北三日程川中平路有驛貞元十年南詔蒙異牟尋用軍破東西兩城斬斷鐵橋大籠官已下投水死者以萬計今西城南詔置兵守禦東城至神川以來半為散地見管浪加萌於浪傳兗長褌磨些撲子河人弄棟等十餘種昆眀城在東瀘之西去龍口十六日程正北有諱苴川正南至松外城又正南至龍怯河西南至小婆城又西南至大婆城西北至三探覽城又西北至鐵橋東城其鐵橋上下乃昆眀雙舍至松外已東邊近瀘水並磨些種落所居之地永昌城古哀牢地在玷蒼山西六日程西北去廣蕩城六十日程廣蕩城接吐蕃界隔候雪山西邊大洞川亦有諸葛武侯城城中有神廟土俗咸共敬畏禱祝不闕蠻夷騎馬遙望廟即下馬趨走西南管柘南城土俗相傳呼為要鎮正南過唐封川至茫天連自蘭滄江已西越賧撲子其種並是望苴子俗尚勇力土又多馬開元已前閉絶與六詔不通盛羅皮始罷柘俞城閣羅鳯已後漸就柔服通計南詔兵數三萬而永西居其一又雜種有金齒漆齒銀齒繡腳穿鼻祼形磨些望外喻等皆三譯四譯言語乃與河賧相通銀生城在撲賧之南去龍尾城十日程東南有通川又直南通河普川又正南通羌浪川郤是邊海無人之境也東至送江川南至卭鵝川又南至林記川又東南至大銀孔又南有婆羅門波斯闍婆勃泥崑崙數種外通交易之處多諸珍寶以黃金麝香為貴貨撲子長鬃等數十種蠻又開南城在龍尾城南十一日程管栁追和都督城又威逺城奉逸城利潤城內有鹽井一百來所茫乃道并黑齒等類十部落皆屬焉陸路去永昌十日程水路下彌臣國三十日程南至南海去崑崙國三日程中間又管模迦羅于泥禮強子等族類五部落越禮城在永昌北管長傍藤彎長傍城三面髙山臨祿江藤彎城南至磨些樂城西南有羅君尋城又西至利城渡水郎陽川直南過山至押西城又南至首外川又西至茫部落又西至鹽井又西至拔熬河麗水城尋傳大川城在水東從上郎坪北里眉羅苴鹽井又至安西城直北至小婆羅門國東有寶山城又西渡麗水至金寶城眉羅苴西南有金生城從金寶城北牟郎城渡麗水至金寶城從金寶城西至道吉川東北至門波城西北至廣蕩城接吐蕃界北對雪山所管部落與鎮西城同鎮西城南至蒼望城臨麗水東北至彌城西北至麗水渡麗水渡面南至祁鮮山山西有神龍河柵祁鮮已西即裸形蠻也管摩零都督城在山上自尋傳祁鮮已往悉有瘴毒地平如砥冬草木不枯日從草際沒諸城鎮官懼瘴癘或越在他處不親視事南詔特於摩零山上築城置腹心理尋傳長傍摩零金彌城等五道事云凡管金齒漆齒繡腳繡面雕題僧耆等十餘部落蠻書卷六
